server {
    listen 80;
    server_name undangabi.ganjardev.biz.id;

    # Maximum file upload size
    client_max_body_size 20M;

    # Use Docker's internal DNS for lazy upstream resolution
    resolver 127.0.0.11 valid=10s;

    # Public Invitation & Landing Page (Root domain)
    location / {
        set $upstream_web http://undangabi-web:80;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend proxy
    location /api {
        set $upstream_api http://undangabi-api:3030;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Customer Dashboard
    location /dashboard {
        set $upstream_customer http://undangabi-customer:80;
        proxy_pass $upstream_customer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        rewrite ^/dashboard(.*)$ /$1 break;
    }

    # Admin Dashboard
    location /admin {
        set $upstream_admin http://undangabi-admin:80;
        proxy_pass $upstream_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        rewrite ^/admin(.*)$ /$1 break;
    }
}
